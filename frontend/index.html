<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biblioteca - Microserviços</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Biblioteca Online</h1>
      <p>Microserviços com Flask</p>
    </header>

    <main>
      <section class="card">
        <h2>Cadastro de Livros</h2>
        <form id="form-livro">
          <label>
            Titulo
            <input type="text" id="livro-titulo" required />
          </label>
          <label>
            Autor
            <input type="text" id="livro-autor" required />
          </label>
          <label>
            Categoria
            <input type="text" id="livro-categoria" required />
          </label>
          <button type="submit">Cadastrar Livro</button>
        </form>
      </section>

      <section class="card">
        <h2>Lista de Livros</h2>
        <button id="btn-listar-livros">Carregar Livros</button>
      </section>

      <section class="card">
        <h2>Cadastro de Emprestimos</h2>
        <form id="form-emprestimo">
          <label>
            Nome do Usuario
            <input type="text" id="emprestimo-usuario" required />
          </label>
          <label>
            ID do Livro
            <input type="text" id="emprestimo-livro" required />
          </label>
          <button type="submit">Registrar Emprestimo</button>
        </form>
      </section>

      <section class="card">
        <h2>Registro de Devolucao</h2>
        <form id="form-devolucao">
          <label>
            ID do Emprestimo
            <input type="text" id="devolucao-id" required />
          </label>
          <button type="submit">Registrar Devolucao</button>
        </form>
      </section>

      <section class="card">
        <h2>Recomendacoes</h2>
        <form id="form-recomendacao">
          <label>
            Categoria
            <input type="text" id="recomendacao-categoria" required />
          </label>
          <button type="submit">Buscar Recomendacoes</button>
        </form>
      </section>

      <section class="card">
        <h2>Respostas da API</h2>
        <div id="respostas" class="responses"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
