services:
  - type: web
    name: frontend-next
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.11.0
      - key: API_GATEWAY_URL
        value: https://api-gateway.onrender.com

  - type: web
    name: api-gateway
    env: python
    plan: free
    rootDir: api_gateway
    buildCommand: pip install -r ../requirements.txt
    startCommand: gunicorn --chdir .. api_gateway.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: CATALOG_SERVICE_URL
        value: https://catalog-service.onrender.com
      - key: LOANS_SERVICE_URL
        value: https://loans-service.onrender.com
      - key: RECOMMENDATION_SERVICE_URL
        value: https://recommendation-service.onrender.com
      - key: CORS_ORIGINS
        value: https://frontend-next.onrender.com

  - type: web
    name: catalog-service
    env: python
    plan: free
    rootDir: servico_catalogo
    buildCommand: pip install -r ../requirements.txt
    startCommand: gunicorn --chdir .. servico_catalogo.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: CATALOGO_DB_PATH
        value: /tmp/catalogo.db
      - key: CORS_ORIGINS
        value: https://api-gateway.onrender.com,https://frontend-next.onrender.com

  - type: web
    name: loans-service
    env: python
    plan: free
    rootDir: servico_emprestimos
    buildCommand: pip install -r ../requirements.txt
    startCommand: gunicorn --chdir .. servico_emprestimos.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: EMPRESTIMOS_DB_PATH
        value: /tmp/emprestimos.db
      - key: CORS_ORIGINS
        value: https://api-gateway.onrender.com,https://frontend-next.onrender.com

  - type: web
    name: recommendation-service
    env: python
    plan: free
    rootDir: servico_recomendacao
    buildCommand: pip install -r ../requirements.txt
    startCommand: gunicorn --chdir .. servico_recomendacao.app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: CATALOG_SERVICE_URL
        value: https://catalog-service.onrender.com
      - key: CORS_ORIGINS
        value: https://api-gateway.onrender.com,https://frontend-next.onrender.com
